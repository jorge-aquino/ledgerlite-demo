<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LedgerLite — Security Dashboard</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <div class="header-inner">
      <span class="logo">⬡ LedgerLite</span>
      <span class="subtitle">Security Dashboard — Demo Environment · NOT FOR PRODUCTION</span>
      <button id="btn-refresh" class="btn-primary">⟳ Re-scan</button>
    </div>
  </header>

  <main>
    <!-- OWASP Scorecard -->
    <section class="panel" id="scorecard-panel">
      <div class="panel-header">
        <h2>OWASP Security Scorecard</h2>
        <span id="score-summary" class="score-summary">Scanning…</span>
      </div>
      <div id="scorecard-grid" class="scorecard-grid">
        <!-- cards injected by JS -->
      </div>
    </section>

    <!-- Customers -->
    <section class="panel" id="customers-panel">
      <div class="panel-header">
        <h2>Customers <span class="tag tag-vuln"> · A02</span></h2>
        <div class="panel-controls">
          <label>Scan IDs 1–<input id="customer-max" type="number" value="5" min="1" max="20" /></label>
        </div>
      </div>
      <div id="customer-list" class="record-list record-grid">Scanning…</div>
      <details class="add-form">
        <summary>＋ Add customer</summary>
        <form id="form-create-customer">
          <div class="form-row">
            <input name="name"        placeholder="Full Name"   required />
            <input name="email"       placeholder="Email"       required type="email" />
            <input name="ssn"         placeholder="SSN (9 digits)" required />
            <input name="card_number" placeholder="Card Number" required />
          </div>
          <button type="submit" class="btn-primary">POST /customers</button>
          <span id="customer-form-status" class="form-status"></span>
        </form>
      </details>
    </section>

    <!-- Transactions -->
    <section class="panel" id="transactions-panel">
      <div class="panel-header">
        <h2>Transactions <span class="tag tag-vuln">VULN #4 · A08</span></h2>
        <div class="panel-controls">
          <label>Scan IDs 1–<input id="tx-max" type="number" value="5" min="1" max="20" /></label>
        </div>
      </div>
      <div id="tx-list" class="record-list record-grid">Scanning…</div>
      <details class="add-form">
        <summary>＋ Add transaction</summary>
        <form id="form-create-tx">
          <div class="form-row">
            <input name="customer_id"  placeholder="Customer ID"    required type="number" />
            <input name="amount_cents" placeholder="Amount (cents)" required type="number" />
            <input name="currency"     placeholder="Currency (USD)" value="USD" />
          </div>
          <button type="submit" class="btn-primary">POST /transactions</button>
          <span id="tx-form-status" class="form-status"></span>
        </form>
      </details>
    </section>

  </main>

  <footer><span>LedgerLite Demo · INTENTIONALLY VULNERABLE · HashiCorp Vault Transit remediation showcase</span></footer>

  <script src="dashboard.js"></script>
</body>
</html>
